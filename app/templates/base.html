<!-- app/templates/base.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}UI{% endblock %}</title>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="/static/splitter.js"></script>

    <link rel="stylesheet" href="/static/style.css" />
    <link rel="stylesheet" href="/static/bottom_panel.css" />
    <link rel="stylesheet" href="/static/fonts.css" />
  </head>
  <body>
    {% block body %}{% endblock %}
    <script>
    function toggleTelemetry(checkbox) {
        var agentId = checkbox.getAttribute('data-agent-id');
        var mode = checkbox.checked ? 'full' : 'none';
        var url = '/api/agent/' + agentId + '/telemetry-mode';
        
        var xhr = new XMLHttpRequest();
        xhr.open('POST', url, true);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                if (xhr.status === 200) {
                    console.log('Telemetry mode set to ' + mode);
                } else {
                    console.error('Failed to set telemetry mode', xhr.status, xhr.responseText);
                }
            }
        };
        xhr.send('telemetry_mode=' + mode);
    }
    </script>
    <script src="/static/tree.js"></script>
    <script src="/static/agents_table.js" defer></script>
    <script src="/static/bottom_tabs.js" defer></script>
    <script src="/static/reset_splitter.js" defer></script>
    <script src="/static/agents_status.js" defer></script>
    <script src="/static/agent_modal.js" defer></script>
  </body>
</html>
