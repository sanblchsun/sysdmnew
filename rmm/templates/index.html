<!-- rmm/templates/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
      }

      video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background-color: black;
        cursor: crosshair;
      }

      .status {
        position: fixed;
        left: 10px;
        bottom: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
      }

      .layout-indicator {
        position: fixed;
        right: 10px;
        bottom: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        padding: 2px 5px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 3px;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline muted></video>
    <div id="status" class="status">Connecting...</div>
    <div id="layoutIndicator" class="layout-indicator">EN</div>

    <script>
      let pc, ws, dc;
      let remoteScreenWidth = 0;
      let remoteScreenHeight = 0;
      let lastMouseMove = 0;
      const mouseMoveThrottle = 16; //ms, ~60fps
      let currentLayout = "en"; // 'en' или 'ru'
      let textBuffer = "";
      let textBufferTimeout = null;
      const TEXT_FLUSH_DELAY = 150; // ms

      // Кириллица -> латинские клавиши (для русской раскладки)
      const cyrillicToLatinMap = {
        й: "q",
        ц: "w",
        у: "e",
        к: "r",
        е: "t",
        н: "y",
        г: "u",
        ш: "i",
        щ: "o",
        з: "p",
        х: "[",
        ъ: "]",
        ф: "a",
        ы: "s",
        в: "d",
        а: "f",
        п: "g",
        р: "h",
        о: "j",
        л: "k",
        д: "l",
        ж: ";",
        э: "'",
        я: "z",
        ч: "x",
        с: "c",
        м: "v",
        и: "b",
        т: "n",
        ь: "m",
        б: ",",
        ю: ".",
        "/": "/",
        ё: "`",
        Ё: "~",
      };

      // Блокируем контекстное меню
      document.addEventListener("contextmenu", (e) => e.preventDefault());

      // Элементы DOM
      const statusEl = document.getElementById("status");
      const video = document.getElementById("video");
      const layoutIndicator = document.getElementById("layoutIndicator");

      // --- Helper-функции ---
      function setStatus(msg, color = "#0f0") {
        statusEl.textContent = msg;
        statusEl.style.color = color;
      }

      function updateLayoutIndicator() {
        layoutIndicator.textContent = currentLayout === "ru" ? "RU" : "EN";
      }

      function sendControl(type, payload) {
        if (dc && dc.readyState === "open") {
          try {
            dc.send(JSON.stringify({ type, ...payload }));
          } catch (e) {
            console.error("Failed to send control message:", e);
          }
        }
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function flushTextBuffer() {
        if (textBuffer.length > 0) {
          console.log("[KEYBOARD] Sending buffered text:", textBuffer);
          sendControl("type_string_input", { text: textBuffer });
          textBuffer = "";
        }
        if (textBufferTimeout) {
          clearTimeout(textBufferTimeout);
          textBufferTimeout = null;
        }
      }

      function isPrintableKey(e) {
        return (
          e.key.length === 1 &&
          !e.ctrlKey &&
          !e.altKey &&
          !e.metaKey &&
          (e.key !== " " || e.code === "Space")
        );
      }

      function mapKeyEventToRobotKey(e) {
        const tagName = e.target.tagName;
        if (
          tagName === "INPUT" ||
          tagName === "TEXTAREA" ||
          e.target.isContentEditable
        ) {
          return null;
        }

        const code = e.code || "";
        const key = e.key || "";

        // Специальная обработка для пробела
        if (e.code === "Space") return "space";

        switch (code) {
          case "Enter":
            return "enter";
          case "Backspace":
            return "backspace";
          case "Tab":
            return "tab";
          case "Escape":
            return "esc";
          case "Delete":
            return "delete";
          case "Insert":
            return "insert";
          case "Home":
            return "home";
          case "End":
            return "end";
          case "PageUp":
            return "pageup";
          case "PageDown":
            return "pagedown";
          case "ArrowLeft":
            return "left";
          case "ArrowRight":
            return "right";
          case "ArrowUp":
            return "up";
          case "ArrowDown":
            return "down";
          case "ControlLeft":
          case "ControlRight":
            return "ctrl";
          case "ShiftLeft":
          case "ShiftRight":
            return "shift";
          case "AltLeft":
          case "AltRight":
            return "alt";
          case "MetaLeft":
          case "MetaRight":
            return navigator.platform.startsWith("Mac") ? "command" : "win";
          case "CapsLock":
            return "capslock";
          case "NumLock":
            return "numlock";
          case "ScrollLock":
            return "scrolllock";
          case "F1":
            return "f1";
          case "F2":
            return "f2";
          case "F3":
            return "f3";
          case "F4":
            return "f4";
          case "F5":
            return "f5";
          case "F6":
            return "f6";
          case "F7":
            return "f7";
          case "F8":
            return "f8";
          case "F9":
            return "f9";
          case "F10":
            return "f10";
          case "F11":
            return "f11";
          case "F12":
            return "f12";
          case "Numpad0":
            return "0";
          case "Numpad1":
            return "1";
          case "Numpad2":
            return "2";
          case "Numpad3":
            return "3";
          case "Numpad4":
            return "4";
          case "Numpad5":
            return "5";
          case "Numpad6":
            return "6";
          case "Numpad7":
            return "7";
          case "Numpad8":
            return "8";
          case "Numpad9":
            return "9";
          case "NumpadDecimal":
            return "period";
          case "NumpadAdd":
            return "add";
          case "NumpadSubtract":
            return "minus";
          case "NumpadMultiply":
            return "multiply";
          case "NumpadDivide":
            return "divide";
          case "NumpadEnter":
            return "enter";
          case "BracketLeft":
            return "[";
          case "BracketRight":
            return "]";
          case "Semicolon":
            return ";";
          case "Quote":
            return "'";
          case "Comma":
            return ",";
          case "Period":
            return ".";
          case "Slash":
            return "/";
          case "Backslash":
            return "\\";
          case "Equal":
            return "=";
          case "Minus":
            return "-";
          case "Backquote":
            return "`";
          default:
            console.log(`[KEYBOARD] Unmapped key.code: ${code}, e.key: ${key}`);
            return null;
        }
      }

      // --- WebSocket и WebRTC соединения ---
      async function connect() {
        const addr =
          "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";
        ws = new WebSocket(addr);

        ws.onopen = async () => {
          console.log("WebSocket connected to", addr);
          setStatus("Connected");

          if (pc) {
            pc.close();
          }
          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          dc = pc.createDataChannel("control");
          setupDataChannel(dc);
          setupConnection(pc);

          try {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send(JSON.stringify(offer));
          } catch (err) {
            console.error("Error creating or sending offer:", err);
            setStatus("WebRTC Error", "#f00");
            pc.close();
            ws.close();
          }
        };

        ws.onmessage = async (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.type === "answer") {
              await pc.setRemoteDescription(data);
            } else if (data.candidate) {
              await pc.addIceCandidate(data);
            }
          } catch (err) {
            console.error("Error parsing or handling WebSocket message:", err);
          }
        };

        ws.onclose = () => {
          console.warn("WebSocket disconnected. Retrying in 2 seconds...");
          setStatus("Reconnecting...", "#f90");
          if (pc) {
            pc.close();
          }
          setTimeout(connect, 2000);
        };

        ws.onerror = (err) => {
          console.error("WebSocket error:", err);
          setStatus("WS Error", "#f00");
          ws.close();
        };
      }

      function setupDataChannel(channel) {
        channel.onopen = () => {
          setStatus("Ready");
          console.log("DataChannel 'control' opened.");
          sendControl("request_screen_info", {});
        };
        channel.onclose = () => {
          setStatus("Disconnected", "#f66");
          console.log("DataChannel 'control' closed.");
          flushTextBuffer(true);
        };
        channel.onerror = (e) =>
          console.error("DataChannel 'control' error:", e);

        channel.onmessage = (e) => {
          let data;
          try {
            data = JSON.parse(e.data);
          } catch (parseErr) {
            console.warn(
              "Failed to parse DataChannel message:",
              parseErr,
              e.data,
            );
            return;
          }

          if (data.type === "screen_info") {
            remoteScreenWidth = data.width;
            remoteScreenHeight = data.height;
            console.log(
              "Received Screen Info:",
              remoteScreenWidth,
              "x",
              remoteScreenHeight,
            );
            syncVideoDimensions();
          }
        };
      }

      function setupConnection(pcInstance) {
        pcInstance.ontrack = (e) => {
          if (video.srcObject !== e.streams[0]) {
            video.srcObject = e.streams[0];
            console.log("Received remote stream.");
          }
        };
        pcInstance.onicecandidate = (e) => {
          if (e.candidate) {
            ws.send(JSON.stringify(e.candidate));
          }
        };
        pcInstance.onconnectionstatechange = () => {
          console.log("Peer Connection State:", pcInstance.connectionState);
          if (
            pcInstance.connectionState === "failed" ||
            pcInstance.connectionState === "closed"
          ) {
            setStatus("Connection Lost", "#f00");
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.close();
            }
          }
        };
        pcInstance.addTransceiver("video", { direction: "recvonly" });
      }

      function syncVideoDimensions() {
        if (video.videoWidth && video.videoHeight) {
          if (
            !remoteScreenWidth ||
            !remoteScreenHeight ||
            Math.abs(remoteScreenWidth - video.videoWidth) > 10 ||
            Math.abs(remoteScreenHeight - video.videoHeight) > 10
          ) {
            remoteScreenWidth = video.videoWidth;
            remoteScreenHeight = video.videoHeight;
            console.log(
              "Auto-synced remote dimensions:",
              remoteScreenWidth,
              "x",
              remoteScreenHeight,
            );
            sendControl("request_screen_info", {});
          }
        }
      }

      video.addEventListener("loadedmetadata", syncVideoDimensions);
      new ResizeObserver(syncVideoDimensions).observe(video);

      function mapPointerToRemote(clientX, clientY) {
        if (remoteScreenWidth <= 0 || remoteScreenHeight <= 0) {
          console.warn(
            "Remote screen dimensions not available for mouse mapping.",
          );
          return null;
        }

        const rect = video.getBoundingClientRect();
        const videoNativeRatio = remoteScreenWidth / remoteScreenHeight;
        const videoElementRatio = rect.width / rect.height;

        let drawWidth,
          drawHeight,
          offsetX = 0,
          offsetY = 0;

        if (videoElementRatio > videoNativeRatio) {
          drawHeight = rect.height;
          drawWidth = drawHeight * videoNativeRatio;
          offsetX = (rect.width - drawWidth) / 2;
        } else {
          drawWidth = rect.width;
          drawHeight = drawWidth / videoNativeRatio;
          offsetY = (rect.height - drawHeight) / 2;
        }

        const xInVideo = clientX - rect.left - offsetX;
        const yInVideo = clientY - rect.top - offsetY;

        if (
          xInVideo < 0 ||
          xInVideo > drawWidth ||
          yInVideo < 0 ||
          yInVideo > drawHeight
        ) {
          return null;
        }

        const remoteX = Math.round(
          clamp(xInVideo / drawWidth, 0, 1) * remoteScreenWidth,
        );
        const remoteY = Math.round(
          clamp(yInVideo / drawHeight, 0, 1) * remoteScreenHeight,
        );

        return { x: remoteX, y: remoteY };
      }

      video.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastMouseMove < mouseMoveThrottle) return;
        lastMouseMove = now;

        const mapped = mapPointerToRemote(e.clientX, e.clientY);
        if (mapped) {
          sendControl("mouse_move", mapped);
        }
      });

      ["mousedown", "mouseup"].forEach((evt) =>
        video.addEventListener(evt, (e) => {
          sendControl(evt === "mousedown" ? "mouse_down" : "mouse_up", {
            button: e.button,
          });
          e.preventDefault();
        }),
      );

      // Обработка событий клавиатуры
      window.addEventListener("keydown", (e) => {
        if (!dc || dc.readyState !== "open") return;

        // Если это печатаемый символ
        if (isPrintableKey(e) && e.key.length === 1) {
          let latKey = e.key;

          // Преобразуем кириллические символы в латинские
          if (/[а-яёА-ЯЁ]/.test(latKey)) {
            latKey = cyrillicToLatinMap[latKey.toLowerCase()] || latKey;
          }

          // Отправляем нажатие клавиши
          sendControl("key_down", { key: latKey });
          e.preventDefault();
          return;
        }

        // Обработка специальных клавиш
        flushTextBuffer(); // отправляем буферизированный текст

        const robotKey = mapKeyEventToRobotKey(e);
        if (robotKey) {
          e.preventDefault();
          sendControl("key_down", { key: robotKey });
        } else {
          e.preventDefault();
        }
      });

      window.addEventListener("keyup", (e) => {
        if (!dc || dc.readyState !== "open") return;

        // Для кириллических символов, отправляем key_up соответствующей латинской клавиши
        if (
          isPrintableKey(e) &&
          e.key.length === 1 &&
          /[а-яёА-ЯЁ]/.test(e.key)
        ) {
          const latKey = cyrillicToLatinMap[e.key.toLowerCase()] || e.key;
          sendControl("key_up", { key: latKey });
          e.preventDefault();
          return;
        }

        // На остальные клавиши
        const robotKey = mapKeyEventToRobotKey(e);
        if (robotKey) {
          e.preventDefault();
          sendControl("key_up", { key: robotKey });
        } else {
          e.preventDefault();
        }
      });

      // Обработчик для потери фокуса, чтобы сбрасывать буфер
      window.addEventListener("blur", () => {
        flushTextBuffer();
      });

      // Переключение раскладки по Ctrl+Shift
      window.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.shiftKey && !e.altKey && !e.metaKey) {
          currentLayout = currentLayout === "ru" ? "en" : "ru";
          updateLayoutIndicator();
          e.preventDefault();
        }
      });

      // Инициализация
      updateLayoutIndicator();
      connect();
    </script>
  </body>
</html>
