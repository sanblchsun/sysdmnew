<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer</title>
  </head>
  <body>
    <h2>Удалённый агент: agent1</h2>
    <video
      id="video"
      autoplay
      playsinline
      controls
      style="width: 100%; height: auto"
    ></video>

    <script>
      const wsUrl =
        "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";
      const ws = new WebSocket(wsUrl);
      console.log("Connecting to signaling server:", wsUrl);

      ws.onopen = async () => {
        console.log("WebSocket open");

        const pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });

        // Логирование состояния соединения
        pc.onconnectionstatechange = () =>
          console.log("PeerConnection state:", pc.connectionState);
        pc.oniceconnectionstatechange = () =>
          console.log("ICE connection state:", pc.iceConnectionState);

        // Приход видео
        pc.ontrack = (event) => {
          console.log("Received track:", event.streams);
          document.getElementById("video").srcObject = event.streams[0];
        };

        // Отправка ICE кандидатов на сервер
        pc.onicecandidate = (event) => {
          if (event.candidate) {
            console.log("Sending ICE candidate:", event.candidate);
            ws.send(JSON.stringify(event.candidate));
          }
        };

        // Добавляем recvonly транскодер для видео
        pc.addTransceiver("video", { direction: "recvonly" });

        // Создаём SDP offer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        console.log("Sending SDP offer");
        ws.send(JSON.stringify(pc.localDescription));

        // Получаем сообщения от агента
        ws.onmessage = async (msg) => {
          const data = JSON.parse(msg.data);

          if (data.sdp) {
            console.log("Received SDP answer:", data.type);
            await pc.setRemoteDescription(data);
          } else if (data.candidate) {
            console.log("Received ICE candidate:", data.candidate);
            try {
              await pc.addIceCandidate(data);
            } catch (e) {
              console.warn("Error adding ICE candidate:", e);
            }
          }
        };
      };

      ws.onclose = () => console.log("WebSocket closed");
      ws.onerror = (err) => console.error("WebSocket error:", err);
    </script>
  </body>
</html>
