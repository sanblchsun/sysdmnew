<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer</title>
    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
      }
      video {
        width: 100%;
        height: 100vh;
        display: block;
        object-fit: contain;
        background-color: black;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline muted></video>

    <script>
      let pc, ws, dc;
      let remoteScreenWidth = 1920;
      let remoteScreenHeight = 1080;

      // --- Connection initialization ---
      async function connect() {
        const wsUrl =
          "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";
        ws = new WebSocket(wsUrl);

        ws.onopen = async () => {
          console.log("Connected to signaling server");

          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          // Create data channel for control input
          dc = pc.createDataChannel("control");
          setupDataChannel(dc);
          setupConnection(pc);

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          ws.send(JSON.stringify(offer));
        };

        // Handle signaling messages (answer + ICE candidates)
        ws.onmessage = async (msg) => {
          const data = JSON.parse(msg.data);
          if (data.type === "answer") {
            await pc.setRemoteDescription(data);
          } else if (data.candidate) {
            await pc.addIceCandidate(data);
          }
        };

        ws.onclose = () => {
          console.warn("Disconnected, retrying in 2s...");
          setTimeout(connect, 2000);
        };
      }

      function setupDataChannel(channel) {
        channel.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type === "screen_info") {
            remoteScreenWidth = data.width;
            remoteScreenHeight = data.height;
            console.log(
              "Remote screen:",
              remoteScreenWidth,
              remoteScreenHeight,
            );
          }
        };
      }

      function setupConnection(pc) {
        pc.ontrack = (event) => {
          document.getElementById("video").srcObject = event.streams[0];
        };

        pc.onicecandidate = (event) => {
          if (event.candidate) ws.send(JSON.stringify(event.candidate));
        };

        // Only receiving video
        pc.addTransceiver("video", { direction: "recvonly" });
      }

      // --- Control event handling ---
      connect();
      const video = document.getElementById("video");
      let lastMouseMove = 0;

      video.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastMouseMove < 16) return; // Limit to ~60Hz
        lastMouseMove = now;

        if (!dc || dc.readyState !== "open") return;

        const rect = video.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const aspectRatio = remoteScreenWidth / remoteScreenHeight;
        const videoAspectRatio = rect.width / rect.height;

        let scaledX, scaledY;
        if (aspectRatio > videoAspectRatio) {
          const height = rect.width / aspectRatio;
          scaledX = (x / rect.width) * remoteScreenWidth;
          scaledY =
            ((y - (rect.height - height) / 2) / height) * remoteScreenHeight;
        } else {
          const width = rect.height * aspectRatio;
          scaledX =
            ((x - (rect.width - width) / 2) / width) * remoteScreenWidth;
          scaledY = (y / rect.height) * remoteScreenHeight;
        }

        sendControl("mouse_move", {
          x: Math.round(scaledX),
          y: Math.round(scaledY),
        });
      });

      ["mousedown", "mouseup"].forEach((eventType) =>
        video.addEventListener(eventType, (e) => {
          sendControl(eventType === "mousedown" ? "mouse_down" : "mouse_up", {
            button: e.button,
          });
        }),
      );

      ["keydown", "keyup"].forEach((eventType) =>
        window.addEventListener(eventType, (e) => {
          sendControl(eventType === "keydown" ? "key_down" : "key_up", {
            key: e.code,
          });
        }),
      );

      function sendControl(type, payload) {
        if (dc && dc.readyState === "open") {
          dc.send(JSON.stringify({ type, ...payload }));
        }
      }
    </script>
  </body>
</html>
