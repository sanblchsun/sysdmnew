<!-- rmm/templates/index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
      }

      video {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background-color: black;
        cursor: crosshair; /* курсор при наведении, чтобы видно было */
      }

      .status {
        position: fixed;
        left: 10px;
        bottom: 10px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline muted></video>
    <div id="status" class="status">Connecting...</div>

    <script>
      let pc, ws, dc;
      let remoteScreenWidth = 0;
      let remoteScreenHeight = 0;
      let lastMouseMove = 0;

      // блокируем контекстное меню
      document.addEventListener("contextmenu", (e) => e.preventDefault());

      // статус
      const statusEl = document.getElementById("status");
      const video = document.getElementById("video");

      function setStatus(msg, color = "#0f0") {
        statusEl.textContent = msg;
        statusEl.style.color = color;
      }

      async function connect() {
        const addr =
          "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";
        ws = new WebSocket(addr);

        ws.onopen = async () => {
          console.log("WS connected");
          setStatus("Connected");

          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          dc = pc.createDataChannel("control");
          setupDataChannel(dc);
          setupConnection(pc);

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          ws.send(JSON.stringify(offer));
        };

        ws.onmessage = async (e) => {
          try {
            const data = JSON.parse(e.data);
            if (data.type === "answer") {
              await pc.setRemoteDescription(data);
            } else if (data.candidate) {
              await pc.addIceCandidate(data);
            }
          } catch (err) {
            console.error(err);
          }
        };

        ws.onclose = () => {
          setStatus("Reconnecting...", "#f90");
          console.warn("Disconnected, retrying...");
          setTimeout(connect, 2000);
        };
      }

      function setupDataChannel(channel) {
        channel.onopen = () => setStatus("Ready");
        channel.onclose = () => setStatus("Disconnected", "#f66");
        channel.onerror = (e) => console.error("DataChannel error:", e);

        channel.onmessage = (e) => {
          let data;
          try {
            data = JSON.parse(e.data);
          } catch {
            return;
          }
          if (data.type === "screen_info") {
            remoteScreenWidth = data.width;
            remoteScreenHeight = data.height;
            console.log("Screen info →", remoteScreenWidth, remoteScreenHeight);
          }
        };
      }

      function setupConnection(pc) {
        pc.ontrack = (e) => {
          video.srcObject = e.streams[0];
        };
        pc.onicecandidate = (e) => {
          if (e.candidate) ws.send(JSON.stringify(e.candidate));
        };
        pc.addTransceiver("video", { direction: "recvonly" });
      }

      // --- Авто‑синхронизация размеров видео (важно!) ---
      function syncVideoDimensions() {
        if (video.videoWidth && video.videoHeight) {
          // если сервер не слал размеры, подхватываем реальные кадры
          if (
            !remoteScreenWidth ||
            !remoteScreenHeight ||
            Math.abs(remoteScreenWidth - video.videoWidth) > 10
          ) {
            remoteScreenWidth = video.videoWidth;
            remoteScreenHeight = video.videoHeight;
            console.log(
              "Auto‑synced from metadata:",
              remoteScreenWidth,
              remoteScreenHeight,
            );
          }
        }
      }

      video.addEventListener("loadedmetadata", syncVideoDimensions);
      new ResizeObserver(syncVideoDimensions).observe(video);

      // --- Управление ---
      function sendControl(type, payload) {
        if (dc && dc.readyState === "open") {
          dc.send(JSON.stringify({ type, ...payload }));
        }
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function mapPointerToRemote(clientX, clientY, rect) {
        if (remoteScreenWidth <= 0 || remoteScreenHeight <= 0) return null;

        const rectRatio = rect.width / rect.height;
        const videoRatio = remoteScreenWidth / remoteScreenHeight;

        let drawWidth,
          drawHeight,
          offsetX = 0,
          offsetY = 0;
        if (rectRatio > videoRatio) {
          drawHeight = rect.height;
          drawWidth = drawHeight * videoRatio;
          offsetX = (rect.width - drawWidth) / 2;
        } else {
          drawWidth = rect.width;
          drawHeight = drawWidth / videoRatio;
          offsetY = (rect.height - drawHeight) / 2;
        }

        const xInVideo = clientX - rect.left - offsetX;
        const yInVideo = clientY - rect.top - offsetY;

        if (
          xInVideo < 0 ||
          xInVideo > drawWidth ||
          yInVideo < 0 ||
          yInVideo > drawHeight
        ) {
          return null;
        }

        const nx = xInVideo / drawWidth;
        const ny = yInVideo / drawHeight;
        const remoteX = Math.round(clamp(nx, 0, 1) * (remoteScreenWidth - 1));
        const remoteY = Math.round(clamp(ny, 0, 1) * (remoteScreenHeight - 1));
        return { x: remoteX, y: remoteY };
      }

      video.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastMouseMove < 16) return;
        lastMouseMove = now;
        if (!dc || dc.readyState !== "open") return;

        const rect = video.getBoundingClientRect();
        const mapped = mapPointerToRemote(e.clientX, e.clientY, rect);
        if (mapped) sendControl("mouse_move", mapped);
      });

      ["mousedown", "mouseup"].forEach((evt) =>
        video.addEventListener(evt, (e) => {
          sendControl(evt === "mousedown" ? "mouse_down" : "mouse_up", {
            button: e.button,
          });
        }),
      );

      ["keydown", "keyup"].forEach((evt) =>
        window.addEventListener(evt, (e) => {
          sendControl(evt === "keydown" ? "key_down" : "key_up", {
            key: e.code,
          });
        }),
      );

      // --- По клику запрашиваем актуальные размеры ---
      video.addEventListener("click", () => {
        sendControl("request_screen_info", {});
      });

      connect();
    </script>
  </body>
</html>
