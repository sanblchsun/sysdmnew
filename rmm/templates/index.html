<!-- rmm/templates/index.html -->
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer</title>
  </head>
  <body>
    <video
      id="video"
      autoplay
      playsinline
      muted
      style="width: 100%; height: auto"
    ></video>

    <script>
      let pc = null;
      let ws = null;
      let dc = null;

      let remoteScreenWidth = 1920;
      let remoteScreenHeight = 1080;

      function connect() {
        const wsUrl =
          "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";

        ws = new WebSocket(wsUrl);

        ws.onopen = async () => {
          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          dc = pc.createDataChannel("control");

          dc.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === "screen_info") {
              remoteScreenWidth = data.width;
              remoteScreenHeight = data.height;
            }
          };

          pc.ontrack = (event) => {
            document.getElementById("video").srcObject = event.streams[0];
          };

          pc.onicecandidate = (event) => {
            if (event.candidate) {
              ws.send(JSON.stringify(event.candidate));
            }
          };

          pc.addTransceiver("video", { direction: "recvonly" });

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          ws.send(JSON.stringify(pc.localDescription));
        };

        ws.onmessage = async (msg) => {
          const data = JSON.parse(msg.data);

          if (data.type === "answer") {
            await pc.setRemoteDescription(new RTCSessionDescription(data));
          } else if (data.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate(data));
          }
        };
      }

      connect();

      const video = document.getElementById("video");

      video.addEventListener("mousemove", (e) => {
        if (!dc || dc.readyState !== "open") return;

        const rect = video.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const scaledX = (x / rect.width) * remoteScreenWidth;
        const scaledY = (y / rect.height) * remoteScreenHeight;

        dc.send(
          JSON.stringify({
            type: "mouse_move",
            x: scaledX,
            y: scaledY,
          }),
        );
      });

      video.addEventListener("mousedown", (e) => {
        dc.send(
          JSON.stringify({
            type: "mouse_down",
            button: e.button,
          }),
        );
      });

      video.addEventListener("mouseup", (e) => {
        dc.send(
          JSON.stringify({
            type: "mouse_up",
            button: e.button,
          }),
        );
      });

      window.addEventListener("keydown", (e) => {
        dc.send(
          JSON.stringify({
            type: "key_down",
            key: e.code,
          }),
        );
      });

      window.addEventListener("keyup", (e) => {
        dc.send(
          JSON.stringify({
            type: "key_up",
            key: e.code,
          }),
        );
      });
    </script>
  </body>
</html>
