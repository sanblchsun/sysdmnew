<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RMM Viewer</title>
    <style>
      body {
        margin: 0;
        background: #111;
        overflow: hidden;
      }
      video {
        width: 100%;
        height: 100vh;
        display: block;
        object-fit: contain;
        background-color: black;
      }
    </style>
  </head>

  <body>
    <video id="video" autoplay playsinline muted></video>

    <script>
      let pc, ws, dc;
      let remoteScreenWidth = 1920;
      let remoteScreenHeight = 1080;

      async function connect() {
        const wsUrl =
          "ws://" + window.location.hostname + ":8000/ws/viewer/agent1";
        ws = new WebSocket(wsUrl);

        ws.onopen = async () => {
          console.log("Connected to signaling server");

          pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
          });

          dc = pc.createDataChannel("control");
          setupDataChannel(dc);
          setupConnection(pc);

          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          ws.send(JSON.stringify(offer));
        };

        ws.onmessage = async (msg) => {
          const data = JSON.parse(msg.data);
          if (data.type === "answer") {
            await pc.setRemoteDescription(data);
          } else if (data.candidate) {
            await pc.addIceCandidate(data);
          }
        };

        ws.onclose = () => {
          console.warn("Disconnected, retrying in 2s...");
          setTimeout(connect, 2000);
        };
      }

      function setupDataChannel(channel) {
        channel.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type === "screen_info") {
            remoteScreenWidth = data.width;
            remoteScreenHeight = data.height;
            console.log(
              "Remote screen:",
              remoteScreenWidth,
              remoteScreenHeight,
            );
          }
        };
      }

      function setupConnection(pc) {
        pc.ontrack = (event) => {
          document.getElementById("video").srcObject = event.streams[0];
        };
        pc.onicecandidate = (event) => {
          if (event.candidate) ws.send(JSON.stringify(event.candidate));
        };
        pc.addTransceiver("video", { direction: "recvonly" });
      }

      connect();
      const video = document.getElementById("video");
      let lastMouseMove = 0;

      function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v));
      }

      // Corrected mapping that perfectly aligns
      function mapPointerToRemote(clientX, clientY, rect) {
        const rw = remoteScreenWidth;
        const rh = remoteScreenHeight;
        if (rw <= 0 || rh <= 0) return { x: 0, y: 0 };

        // video display area with aspect ratio preserved
        const rectRatio = rect.width / rect.height;
        const videoRatio = rw / rh;

        let drawWidth, drawHeight, offsetX, offsetY;
        if (rectRatio > videoRatio) {
          // black bars on sides
          drawHeight = rect.height;
          drawWidth = drawHeight * videoRatio;
          offsetX = (rect.width - drawWidth) / 2;
          offsetY = 0;
        } else {
          // black bars top/bottom
          drawWidth = rect.width;
          drawHeight = drawWidth / videoRatio;
          offsetX = 0;
          offsetY = (rect.height - drawHeight) / 2;
        }

        const xInVideo = clientX - rect.left - offsetX;
        const yInVideo = clientY - rect.top - offsetY;

        if (
          xInVideo < 0 ||
          yInVideo < 0 ||
          xInVideo > drawWidth ||
          yInVideo > drawHeight
        ) {
          return null; // outside of active video area
        }

        const nx = xInVideo / drawWidth;
        const ny = yInVideo / drawHeight;
        const remoteX = Math.round(clamp(nx, 0, 1) * rw);
        const remoteY = Math.round(clamp(ny, 0, 1) * rh);
        return { x: remoteX, y: remoteY };
      }

      video.addEventListener("mousemove", (e) => {
        const now = Date.now();
        if (now - lastMouseMove < 16) return;
        lastMouseMove = now;

        if (!dc || dc.readyState !== "open") return;
        const rect = video.getBoundingClientRect();
        const mapped = mapPointerToRemote(e.clientX, e.clientY, rect);
        if (!mapped) return;
        sendControl("mouse_move", mapped);
      });

      ["mousedown", "mouseup"].forEach((eventType) =>
        video.addEventListener(eventType, (e) => {
          sendControl(eventType === "mousedown" ? "mouse_down" : "mouse_up", {
            button: e.button,
          });
        }),
      );

      ["keydown", "keyup"].forEach((eventType) =>
        window.addEventListener(eventType, (e) => {
          sendControl(eventType === "keydown" ? "key_down" : "key_up", {
            key: e.code,
          });
        }),
      );

      function sendControl(type, payload) {
        if (dc && dc.readyState === "open") {
          dc.send(JSON.stringify({ type, ...payload }));
        }
      }

      window.addEventListener("resize", () => {
        lastMouseMove = 0;
      });
    </script>
  </body>
</html>
