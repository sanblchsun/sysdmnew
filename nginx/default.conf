# nginx/default.conf
server {
    listen 80;
    server_name dev.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.local;
    
    http2 on;
    ssl_certificate /etc/letsencrypt/live/dev.local/localhost+2.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.local/localhost+2-key.pem;

    # Добавьте эти заголовки
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Увеличиваем лимиты для видео стрима
    client_max_body_size 0;
    client_body_timeout 300s;
    client_header_timeout 300s;
    send_timeout 300s;
    keepalive_timeout 300s;

    # Статические файлы с правильной кодировкой
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Исправление кодировки
        charset utf-8;
        
        # Для CSS файлов
        location ~* \.css$ {
            add_header Content-Type "text/css; charset=utf-8";
        }
        
        # Для JS файлов
        location ~* \.js$ {
            add_header Content-Type "application/javascript; charset=utf-8";
        }
    }

    # Видео инджест - специальные настройки для больших потоков
    location /ingest/ {
        proxy_pass http://172.19.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Отключаем все буферизации для стриминга
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_buffer_size 4k;
        
        # Увеличиваем таймауты для длинных стримов
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Увеличиваем размеры буферов
        client_max_body_size 0;
        client_body_buffer_size 512k;
    }

    # WebSocket маршруты
    location /ws/ {
        proxy_pass http://172.19.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
        
        # Отключаем буферизацию для WebSocket
        proxy_buffering off;
    }

    # Остальные маршруты
    location / {
        proxy_pass http://172.19.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_buffering off;
        proxy_request_buffering off;
    }
}

# Переменная для WebSocket connections
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}
